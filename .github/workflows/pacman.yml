name: generate animation

on:
  schedule:
    - cron: "0 0 * * *" # Roda uma vez por dia
  workflow_dispatch: # Permite que você rode manualmente
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#E63946&color_dots=#161b22,#4c1d1d,#7a1d1d,#ac1d1d,#e63946
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#E63946
          
      - name: push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
